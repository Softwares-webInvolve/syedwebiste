# nginx server config for the static Vite build (SPA).
# Listens on 8080 (NOT 3000) — set this same port in Easypanel.
server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # --- Hashed build assets: cache hard & immutable ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Media / fonts: cache for a month ---
    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|webm|mp4|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # --- SPA fallback: every unknown route serves index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell (so new deploys are picked up immediately)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
